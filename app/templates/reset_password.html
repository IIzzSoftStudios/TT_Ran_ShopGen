<!DOCTYPE html>
<html lang="en">
<head>
    <title>Reset Password</title>
    {% include 'partials/theme_head.html' %}

    <style>
        /* Center everything */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Styling for the heading */
        h2 {
            font-size: 2.5rem;
            color: black;
            margin-bottom: 20px;
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            min-width: 300px;
        }

        label {
            font-size: 1rem;
            margin-top: 10px;
        }

        input {
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            width: 100%;
        }

        button {
            background-color: purple;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s, transform 0.3s;
        }

        button:hover {
            background-color: #2980b9;
            transform: scale(1.1);
        }

        p {
            margin-top: 15px;
        }

        .back-link {
            color: purple;
            text-decoration: none;
            margin-top: 10px;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .token-info {
            background-color: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #856404;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h2>Reset Password</h2>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="otp_code">6-digit code:</label>
        <input type="text" id="otp_code" name="otp_code" required maxlength="6" pattern="[0-9]{6}" placeholder="000000" title="Enter the 6-digit code from your email">
        <label for="password">New Password:</label>
        <input type="password" id="password" name="password" required
               minlength="8"
               pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+]).{8,}"
               title="Must be at least 8 characters, include one uppercase, one lowercase, and one special character.">
        <label for="confirm_password">Confirm New Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <button type="submit">Reset Password</button>
    </form>
    <p><a href="{{ url_for('auth.login') }}" class="back-link">← Back to Login</a></p>
</body>
</html>
